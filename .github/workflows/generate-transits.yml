name: Generate Annual Transit Data

on:
  schedule:
    - cron: '0 17 1 9 *'
  workflow_dispatch:
    inputs:
      year:
        description: 'Year to generate data for (defaults to next year)'
        required: false
        default: ''

jobs:
  generate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Calculate target year
        id: year
        run: |
          if [ -n "${{ github.event.inputs.year }}" ]; then
            echo "year=${{ github.event.inputs.year }}" >> $GITHUB_OUTPUT
          else
            echo "year=$(date -d '+1 year' +'%Y')" >> $GITHUB_OUTPUT
          fi

      - name: Trigger transit generation
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -d '{"secret":"${{ secrets.GENERATION_SECRET }}","year":${{ steps.year.outputs.year }}}' \
            https://keys-to-the-stars.netlify.app/.netlify/functions/generate-transits

      - name: Pull generated file
        run: |
          sleep 120
          curl -o public/transits-${{ steps.year.outputs.year }}.json \
            https://keys-to-the-stars.netlify.app/transits-${{ steps.year.outputs.year }}.json

      - name: Commit and push data file
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/transits-*.json
          git diff --staged --quiet || git commit -m "Auto
